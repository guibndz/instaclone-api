services:
  mysql:
    image: mysql:8.0
    container_name: instaclone_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: instaclone
      MYSQL_USER: instaclone
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: